<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan to Preview — Project Ascend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0B;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    p { color: #8E8E93; font-size: 0.875rem; text-align: center; max-width: 320px; }
    .url {
      background: #1C1C1E;
      border-radius: 12px;
      padding: 12px 20px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8125rem;
      color: #4B0082;
      word-break: break-all;
      text-align: center;
      max-width: 360px;
    }
    .qrcode {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 0 32px rgba(75, 0, 130, 0.3);
    }
    .hint {
      font-size: 0.75rem;
      color: #636366;
      margin-top: 8px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <h1>🚀 Project Ascend</h1>
  <div class="qrcode" id="qrcode"></div>
  <p>Scan with your phone camera to preview the app.<br>Phone must be on the same Wi-Fi network.</p>
  <div class="url" id="urlDisplay">http://192.168.1.165:3001</div>
  <p class="hint">Verify your firewall allows port 3001 on your local network</p>
  <script>
    const url = "http://192.168.1.165:3001";
    document.getElementById("urlDisplay").textContent = url;
    new QRCode(document.getElementById("qrcode"), {
      text: url,
      width: 220,
      height: 220,
      colorDark: "#0A0A0B",
      colorLight: "#FFFFFF",
    });
  </script>
</body>
</html>
